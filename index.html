<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="LIQ"/>
<meta name="theme-color" content="#ffffff"/>
<title>LIQ CALC</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[data-theme="light"]{
  --bg:#f0f0f0;--bg2:#fff;--fg:#000;
  --b1:#d5d5d5;--b2:#c5c5c5;--b3:#aaa;
  --dim:#111;--dim2:#666;
  --card:#fff;--nav:#fff;
  --input-border:#ccc;--input-border-focus:#000;
  --bar-bg:#e8e8e8;--bar-fill:#000;
  --btn-p-bg:#000;--btn-p-fg:#fff;
  --btn-s-border:#ccc;--btn-s-fg:#666;
  --toast-bg:#000;--toast-fg:#fff;
  --up:#16a34a;--down:#dc2626;
}
[data-theme="dark"]{
  --bg:#000;--bg2:#111;--fg:#fff;
  --b1:#222;--b2:#333;--b3:#444;
  --dim:#fff;--dim2:#888;
  --card:#111;--nav:#000;
  --input-border:#333;--input-border-focus:#fff;
  --bar-bg:#222;--bar-fill:#fff;
  --btn-p-bg:#fff;--btn-p-fg:#000;
  --btn-s-border:#333;--btn-s-fg:#666;
  --toast-bg:#fff;--toast-fg:#000;
  --up:#4ade80;--down:#f87171;
}
:root{--font:-apple-system,'SF Pro Text','SF Pro Display',system-ui,sans-serif;--r:10px;}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;overscroll-behavior:none;font-size:14px;transition:background .2s,color .2s}
body{display:flex;flex-direction:column;min-height:100dvh}
::-webkit-scrollbar{width:0}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}

.safe-top{height:env(safe-area-inset-top);background:var(--bg2);flex-shrink:0;transition:background .2s}
.app{flex:1;display:flex;flex-direction:column;max-width:480px;margin:0 auto;width:100%;overflow:hidden;min-height:0}
.scroll-area{flex:1;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom) + 64px)}

/* Header */
.header{padding:13px 16px 11px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0;transition:background .2s,border-color .2s}
.h-title{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--fg)}
.h-right{display:flex;gap:8px;align-items:center}
.ws-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s;flex-shrink:0}
.ws-dot.connected{background:var(--up)}
.ws-dot.error{background:var(--down)}
.btn-icon{background:none;border:1px solid var(--b2);color:var(--dim2);border-radius:6px;padding:5px 9px;font-family:var(--font);font-size:12px;cursor:pointer;transition:all .15s;line-height:1}
.btn-icon:active{background:var(--b1);color:var(--fg)}

/* Nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--nav);border-top:1px solid var(--b1);padding-bottom:env(safe-area-inset-bottom);transition:background .2s,border-color .2s}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0;background:none;border:none;cursor:pointer}
.nav-btn span{font-size:9px;letter-spacing:.06em;text-transform:uppercase;transition:color .15s;font-weight:500}
.nav-icon{font-size:17px;line-height:1;transition:color .15s}
.nav-btn.active span,.nav-btn.active .nav-icon{color:var(--fg)}
.nav-btn:not(.active) span,.nav-btn:not(.active) .nav-icon{color:var(--b3)}

/* Sections */
.sec{padding:14px 16px}
.lbl{font-size:10px;font-weight:600;color:var(--dim2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}

/* Card */
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:background .2s,border-color .2s}

/* Position card */
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pos-left{}
.pos-sym{font-size:17px;font-weight:600;letter-spacing:.01em}
.pos-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--b1);color:var(--dim2);margin-top:4px;letter-spacing:.04em}
.pos-right{text-align:right}
.pos-price-lbl{font-size:10px;color:var(--dim2);font-weight:500;letter-spacing:.04em}
.pos-price-val{font-size:22px;font-weight:300;letter-spacing:-.01em;line-height:1.1;margin-top:1px}
.pos-price-change{font-size:11px;font-weight:500;margin-top:1px}
.up{color:var(--up)}
.down{color:var(--down)}

/* Liq row */
.liq-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--b1)}
.liq-lbl{font-size:10px;color:var(--dim2);font-weight:500}
.liq-val{font-size:16px;font-weight:500;letter-spacing:-.01em}
.liq-danger{text-decoration:underline;text-decoration-style:wavy;text-underline-offset:3px}

/* Stats */
.pos-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:10px;border-top:1px solid var(--b1)}
.stat-lbl{font-size:10px;color:var(--dim2);font-weight:500;margin-bottom:2px}
.stat-val{font-size:12px;font-weight:500}

/* Progress bar */
.bar-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)}
.bar-meta{display:flex;justify-content:space-between;font-size:10px;font-weight:500;color:var(--dim2);margin-bottom:5px}
.bar-bg{height:2px;background:var(--bar-bg);border-radius:1px;overflow:hidden}
.bar-fill{height:100%;background:var(--bar-fill);border-radius:1px;transition:width .5s ease}

/* Wallet row */
.wallet-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;transition:all .2s}
.wl{font-size:10px;font-weight:600;color:var(--dim2);letter-spacing:.06em}
.wv{font-size:20px;font-weight:300;letter-spacing:-.01em}

/* Margin input card */
.margin-card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;transition:all .2s}
.margin-card.active{border-color:var(--up)}
.margin-inner{display:flex;align-items:center;gap:10px}
.margin-icon{font-size:14px;color:var(--dim2);flex-shrink:0;transition:color .2s}
.margin-card.active .margin-icon{color:var(--up)}
.margin-field{flex:1;position:relative}
.margin-field input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--input-border);color:var(--fg);font-family:var(--font);font-size:15px;font-weight:400;padding:4px 50px 4px 0;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.margin-field input:focus{border-color:var(--input-border-focus)}
.margin-field input::placeholder{color:var(--b3)}
.margin-sfx{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:11px;color:var(--dim2);pointer-events:none;font-weight:500}
.margin-new-bal{font-size:11px;color:var(--dim2);font-weight:500;margin-top:6px;text-align:right;transition:color .2s}
.margin-card.active .margin-new-bal{color:var(--up)}
.margin-reset{background:none;border:1px solid var(--b2);border-radius:5px;color:var(--dim2);font-family:var(--font);font-size:10px;font-weight:500;padding:3px 8px;cursor:pointer;flex-shrink:0;transition:all .15s}
.margin-reset:active{border-color:var(--fg);color:var(--fg)}

/* Liq sim delta row inside position card */
.liq-sim-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--b1)}
.liq-sim-lbl{font-size:10px;color:var(--dim2);font-weight:500}
.liq-sim-val{font-size:14px;font-weight:600;letter-spacing:-.01em}

/* Fields */
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;font-weight:600;color:var(--dim2);letter-spacing:.06em;text-transform:uppercase}
.fw{position:relative}
.fw input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--input-border);color:var(--fg);font-family:var(--font);font-size:15px;font-weight:400;padding:6px 26px 6px 0;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.fw input:focus{border-color:var(--input-border-focus)}
.fw input::placeholder{color:var(--b3)}
.fsfx{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:11px;color:var(--dim2);pointer-events:none;font-weight:500}

/* Dir toggle */
.dir-toggle{display:flex;border:1px solid var(--b2);border-radius:8px;overflow:hidden;margin-bottom:14px}
.dir-btn{flex:1;padding:9px;font-family:var(--font);font-size:12px;font-weight:500;letter-spacing:.04em;cursor:pointer;border:none;background:transparent;color:var(--dim2);transition:all .15s}
.dir-btn.on{background:var(--fg);color:var(--bg)}

/* Buttons */
.btn-p{width:100%;padding:13px;border:none;border-radius:var(--r);background:var(--btn-p-bg);color:var(--btn-p-fg);font-family:var(--font);font-size:13px;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all .15s}
.btn-p:active{opacity:.75}
.btn-s{width:100%;padding:11px;border:1px solid var(--btn-s-border);border-radius:var(--r);background:transparent;color:var(--btn-s-fg);font-family:var(--font);font-size:12px;font-weight:500;letter-spacing:.04em;cursor:pointer;margin-top:8px;transition:all .15s}
.btn-s:active{background:var(--b1)}
.btn-add{padding:6px 12px;border:1px solid var(--b2);border-radius:6px;background:transparent;color:var(--dim2);font-family:var(--font);font-size:11px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-add:active{border-color:var(--fg);color:var(--fg)}
.btn-rm{background:none;border:none;color:var(--b3);font-size:20px;cursor:pointer;padding:0 2px;line-height:1;align-self:flex-end;padding-bottom:5px}
.btn-rm:active{color:var(--fg)}

/* Entry rows */
.entry-row{display:grid;grid-template-columns:1fr 1fr 1fr 22px;gap:10px;align-items:end;margin-bottom:12px}

/* Sim result */
.result-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0}
.result-row+.result-row{border-top:1px solid var(--b1)}
.rl{font-size:11px;color:var(--dim2);font-weight:500}
.rv{font-size:15px;font-weight:500}
.rv-big{font-size:24px;font-weight:300;letter-spacing:-.01em}
.delta-row{margin-top:8px;padding:9px 12px;border:1px solid var(--b1);border-radius:8px;display:flex;justify-content:space-between;align-items:center;background:var(--bg)}

/* Toast */
.toast{position:fixed;top:calc(env(safe-area-inset-top) + 52px);left:50%;transform:translateX(-50%) translateY(-4px);background:var(--toast-bg);color:var(--toast-fg);border-radius:6px;padding:9px 16px;font-size:12px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Empty */
.empty{text-align:center;padding:52px 20px;color:var(--dim2)}
.empty-t{font-size:13px;line-height:1.7;font-weight:400}

/* Animations */
.fi{animation:fi .2s ease forwards}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.blink{animation:bl 1.4s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.flash{animation:flash .4s ease}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.3}}

/* Setup */
.setup{padding:20px 16px;display:flex;flex-direction:column;gap:12px}

select{background:var(--card);border:1px solid var(--b2);color:var(--fg);font-family:var(--font);font-size:14px;font-weight:400;padding:8px 10px;border-radius:8px;width:100%;outline:none;-webkit-appearance:none;transition:all .2s}
select:focus{border-color:var(--input-border-focus)}
</style>
</head>
<body>
<div class="safe-top"></div>
<div class="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="ws-dot" id="wsDot"></div>
      <span class="h-title">LIQ CALC</span>
    </div>
    <div class="h-right">
      <button class="btn-icon" id="themeBtn" onclick="toggleTheme()">☽</button>
      <button class="btn-icon" id="refreshBtn" onclick="refreshPositions()" style="display:none"><span id="ri">⟳</span></button>
    </div>
  </div>
  <div class="scroll-area" id="scrollArea"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-positions" onclick="showPage('positions')">
      <span class="nav-icon">▦</span><span>Позиции</span>
    </button>
    <button class="nav-btn" id="nav-simulator" onclick="showPage('simulator')">
      <span class="nav-icon">◎</span><span>Симулятор</span>
    </button>
    <button class="nav-btn" id="nav-settings" onclick="showPage('settings')">
      <span class="nav-icon">⚙</span><span>API</span>
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
// ── Theme ──────────────────────────────────────────────────────────────────────
let theme = localStorage.getItem('theme') || 'light';
applyTheme(theme);
function applyTheme(t) {
  theme = t;
  document.documentElement.setAttribute('data-theme', t);
  document.getElementById('themeBtn').textContent = t === 'light' ? '☽' : '☀︎';
  document.querySelector('meta[name="theme-color"]').content = t === 'light' ? '#ffffff' : '#000000';
  localStorage.setItem('theme', t);
}
function toggleTheme() { applyTheme(theme === 'light' ? 'dark' : 'light'); }

// ── State ──────────────────────────────────────────────────────────────────────
const S = {
  apiKey: localStorage.getItem('bk') || '',
  apiSecret: localStorage.getItem('bs') || '',
  positions: [], walletBalance: 0, loading: false, page: 'positions',
  prices: {},
  simDir: 'SHORT', simSymbol: 'BTCUSDT',
  simEntries: [{id:1, price:'', qty:'', leverage:'10'}],
  extraMargin: 0, // additional margin for simulation on positions page
};
const MM = 0.005;

// ── WebSocket ──────────────────────────────────────────────────────────────────
let ws = null;
let wsReconnectTimer = null;
let wsSubscribed = [];

function wsConnect() {
  if (ws && ws.readyState <= 1) return;
  ws = new WebSocket('wss://stream.bybit.com/v5/public/linear');
  ws.onopen = () => {
    setWsDot('connected');
    if (wsSubscribed.length) wsSubscribe(wsSubscribed);
  };
  ws.onmessage = (e) => {
    const d = JSON.parse(e.data);
    if (d.topic && d.topic.startsWith('tickers.')) {
      const sym = d.topic.split('.')[1];
      const price = parseFloat(d.data?.lastPrice);
      if (price) {
        const prev = S.prices[sym]?.price || price;
        S.prices[sym] = { price, prevPrice: prev };
        updatePriceDom(sym, price, prev);
      }
    }
  };
  ws.onclose = () => {
    setWsDot('');
    wsReconnectTimer = setTimeout(wsConnect, 3000);
  };
  ws.onerror = () => { setWsDot('error'); ws.close(); };
}

function wsSubscribe(symbols) {
  wsSubscribed = [...new Set(symbols)];
  if (!ws || ws.readyState !== 1) { wsConnect(); return; }
  ws.send(JSON.stringify({ op: 'subscribe', args: symbols.map(s => `tickers.${s}`) }));
}

function setWsDot(state) {
  const d = document.getElementById('wsDot');
  if (d) { d.className = 'ws-dot' + (state ? ' ' + state : ''); }
}

function updatePriceDom(sym, price, prev) {
  const el = document.getElementById('price-' + sym);
  if (el) {
    el.textContent = '$' + fp(price);
    el.classList.remove('flash');
    void el.offsetWidth;
    el.classList.add('flash');
  }
  const chEl = document.getElementById('pchange-' + sym);
  if (chEl) {
    const pos = S.positions.find(p => p.symbol === sym);
    if (pos) {
      const entry = parseFloat(pos.avgPrice);
      const side = pos.side;
      const pct = side === 'Sell' ? (entry - price) / entry * 100 : (price - entry) / entry * 100;
      chEl.textContent = (pct >= 0 ? '+' : '') + f(pct, 2) + '%';
      chEl.className = 'pos-price-change ' + (pct >= 0 ? 'up' : 'down');
    }
  }
  if (S.page === 'simulator') updateSimResult();
}

// ── Bybit Auth API ─────────────────────────────────────────────────────────────
async function bybitSign(params) {
  const ts = Date.now().toString(), rw = '5000';
  const qs = Object.keys(params).sort().map(k => `${k}=${params[k]}`).join('&');
  const pl = ts + S.apiKey + rw + qs;
  const k = await crypto.subtle.importKey('raw', new TextEncoder().encode(S.apiSecret), {name:'HMAC',hash:'SHA-256'}, false, ['sign']);
  const sig = await crypto.subtle.sign('HMAC', k, new TextEncoder().encode(pl));
  return { ts, rw, hex: Array.from(new Uint8Array(sig)).map(b => b.toString(16).padStart(2,'0')).join('') };
}
async function bybit(ep, params = {}) {
  const {ts, rw, hex} = await bybitSign(params);
  const qs = Object.keys(params).sort().map(k => `${k}=${encodeURIComponent(params[k])}`).join('&');
  const r = await fetch(`https://api.bybit.com${ep}${qs ? '?' + qs : ''}`, {
    headers: {'X-BAPI-API-KEY': S.apiKey, 'X-BAPI-TIMESTAMP': ts, 'X-BAPI-RECV-WINDOW': rw, 'X-BAPI-SIGN': hex}
  });
  return r.json();
}

async function refreshPositions() {
  if (!S.apiKey || !S.apiSecret) { toast('⚠ Нет API ключей'); showPage('settings'); return; }
  if (S.loading) return;
  S.loading = true;
  document.getElementById('ri').className = 'spin';
  try {
    const [pd, wd] = await Promise.all([
      bybit('/v5/position/list', {category: 'linear', settleCoin: 'USDT'}),
      bybit('/v5/account/wallet-balance', {accountType: 'UNIFIED'})
    ]);
    if (pd.retCode !== 0) throw new Error(pd.retMsg);
    S.positions = (pd.result.list || []).filter(p => parseFloat(p.size) > 0);
    const coin = wd.result.list?.[0]?.coin?.find(c => c.coin === 'USDT');
    S.walletBalance = parseFloat(coin?.walletBalance || 0);
    const syms = [...new Set(S.positions.map(p => p.symbol))];
    if (syms.length) wsSubscribe(syms);
    if (S.page === 'positions') renderPositions();
    toast('✓ Обновлено');
  } catch(e) { toast('✗ ' + e.message); }
  finally {
    S.loading = false;
    const ri = document.getElementById('ri');
    if (ri) { ri.className = ''; ri.textContent = '⟳'; }
  }
}

// ── Calc ───────────────────────────────────────────────────────────────────────
function totalIM() {
  return S.positions.reduce((s, p) => {
    const pv = parseFloat(p.avgPrice) * parseFloat(p.size);
    return s + pv / parseFloat(p.leverage);
  }, 0);
}
function liqFromPos(p, wb) {
  const ap = parseFloat(p.avgPrice), sz = parseFloat(p.size);
  const pv = ap * sz, mm = pv * MM;
  const im = totalIM();
  const liq = p.side === 'Sell'
    ? ap + (wb - im + mm) / sz
    : ap - (wb - im + mm) / sz;
  return Math.max(0.0001, liq);
}
function liqSim(wb) {
  const es = S.simEntries.filter(e => parseFloat(e.price) > 0 && parseFloat(e.qty) > 0);
  if (!es.length || !wb) return null;
  const allIM = [
    ...S.positions.map(p => ({p: parseFloat(p.avgPrice), q: parseFloat(p.size), l: parseFloat(p.leverage)})),
    ...es.map(e => ({p: parseFloat(e.price), q: parseFloat(e.qty), l: parseFloat(e.leverage) || 1}))
  ].reduce((s, e) => s + (e.p * e.q) / e.l, 0);
  const simQ = es.reduce((s, e) => s + parseFloat(e.qty), 0);
  const simAvg = es.reduce((s, e) => s + parseFloat(e.price) * parseFloat(e.qty), 0) / simQ;
  const match = S.positions.find(p => p.symbol === S.simSymbol && ((p.side === 'Sell' && S.simDir === 'SHORT') || (p.side === 'Buy' && S.simDir === 'LONG')));
  let tq = simQ, tav = simAvg * simQ;
  if (match) { tq += parseFloat(match.size); tav += parseFloat(match.avgPrice) * parseFloat(match.size); }
  const avg = tav / tq, pv = avg * tq, mm = pv * MM;
  return S.simDir === 'SHORT' ? avg + (wb - allIM + mm) / tq : avg - (wb - allIM + mm) / tq;
}

function f(n, d = 2) { if (n === null || isNaN(n)) return '—'; return Number(n).toLocaleString('ru-RU', {minimumFractionDigits: d, maximumFractionDigits: d}); }
function fp(n) { return n >= 1000 ? f(n, 0) : n >= 1 ? f(n, 2) : f(n, 4); }
function distPct(liq, entry, side) { if (!liq || !entry) return null; return side === 'Sell' ? (liq - entry) / entry * 100 : (entry - liq) / entry * 100; }

// ── Nav ────────────────────────────────────────────────────────────────────────
function showPage(p) {
  S.page = p;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + p)?.classList.add('active');
  const rb = document.getElementById('refreshBtn');
  rb.style.display = p === 'positions' ? '' : 'none';
  if (p === 'positions') renderPositions();
  else if (p === 'simulator') renderSimulator();
  else renderSettings();
}

// ── Positions ──────────────────────────────────────────────────────────────────
function renderPositions() {
  const area = document.getElementById('scrollArea');
  if (!S.apiKey || !S.apiSecret) {
    area.innerHTML = `<div class="sec fi"><div class="empty"><div style="font-size:2rem;margin-bottom:10px">—</div><div class="empty-t">Нет API ключей.<br>Добавь в разделе API.</div><br><button class="btn-p" style="max-width:160px;margin:0 auto;display:block" onclick="showPage('settings')">Добавить</button></div></div>`;
    return;
  }
  if (!S.positions.length) {
    area.innerHTML = `<div class="sec fi"><div class="empty"><div style="font-size:2rem;margin-bottom:10px">○</div><div class="empty-t">Нет открытых позиций</div></div></div>`;
    return;
  }

  const em = S.extraMargin;
  const wb = S.walletBalance;
  const wbSim = wb + em;
  const hasMargin = em > 0;

  let h = `<div class="sec fi">`;

  // Wallet balance row
  if (wb > 0) {
    h += `<div class="wallet-row"><span class="wl">БАЛАНС</span><span class="wv">$${f(wb, 0)}${hasMargin ? ` <span style="font-size:14px;color:var(--up);font-weight:500">→ $${f(wbSim, 0)}</span>` : ''}</span></div>`;
  }

  // Extra margin input
  h += `<div class="margin-card${hasMargin ? ' active' : ''}" id="marginCard">
    <div class="lbl" style="margin-bottom:6px">ДОБАВИТЬ МАРЖУ</div>
    <div class="margin-inner">
      <span class="margin-icon">＋</span>
      <div class="margin-field">
        <input type="number" inputmode="decimal" id="extraMarginInput" placeholder="0" value="${em || ''}"/>
        <span class="margin-sfx">USDT</span>
      </div>
      ${hasMargin ? `<button class="margin-reset" onclick="clearExtraMargin()">Сброс</button>` : ''}
    </div>
    ${hasMargin ? `<div class="margin-new-bal">Новый баланс: $${f(wbSim, 2)}</div>` : ''}
  </div>`;

  // Position cards
  S.positions.forEach(p => {
    const ap = parseFloat(p.avgPrice), sz = parseFloat(p.size), lv = parseFloat(p.leverage), pnl = parseFloat(p.unrealisedPnl);
    const liq = liqFromPos(p, wb);
    const d = distPct(liq, ap, p.side);
    const danger = d !== null && d < 8;
    const sym = p.symbol.replace('USDT', '');
    const curPrice = S.prices[p.symbol]?.price;
    const pricePct = curPrice ? (p.side === 'Sell' ? (ap - curPrice) / ap * 100 : (curPrice - ap) / ap * 100) : null;

    // Simulated liq with extra margin
    const liqNew = hasMargin ? liqFromPos(p, wbSim) : null;
    const dNew = liqNew ? distPct(liqNew, ap, p.side) : null;
    const dangerNew = dNew !== null && dNew < 8;
    const liqDelta = liqNew ? Math.abs(liqNew - liq) : null;
    const liqBetter = liqNew ? (p.side === 'Sell' ? liqNew > liq : liqNew < liq) : null;

    h += `<div class="card fi" style="${(hasMargin ? dangerNew : danger) ? 'border-color:var(--down);' : ''}">
      <div class="pos-header">
        <div class="pos-left">
          <div class="pos-sym">${sym}/USDT</div>
          <span class="pos-badge">${p.side === 'Sell' ? 'SHORT' : 'LONG'} · ${lv}x</span>
        </div>
        <div class="pos-right">
          <div class="pos-price-lbl">ТЕКУЩАЯ ЦЕНА</div>
          <div class="pos-price-val" id="price-${p.symbol}">${curPrice ? '$' + fp(curPrice) : '—'}</div>
          <div class="pos-price-change ${pricePct !== null ? (pricePct >= 0 ? 'up' : 'down') : ''}" id="pchange-${p.symbol}">
            ${pricePct !== null ? (pricePct >= 0 ? '+' : '') + f(pricePct, 2) + '%' : ''}
          </div>
        </div>
      </div>
      <div class="liq-row">
        <span class="liq-lbl">ЛИКВИДАЦИЯ</span>
        <span class="liq-val ${danger ? 'liq-danger blink' : ''}" id="liq-${p.symbol}">$${fp(liq)}</span>
      </div>
      ${hasMargin ? `
      <div class="liq-sim-row">
        <span class="liq-sim-lbl">ПОСЛЕ ДОБАВЛЕНИЯ</span>
        <span class="liq-sim-val ${dangerNew ? 'down' : 'up'}" id="liqsim-${p.symbol}">$${fp(liqNew)}</span>
      </div>
      <div class="liq-sim-row">
        <span class="liq-sim-lbl">ИЗМЕНЕНИЕ</span>
        <span class="liq-sim-val ${liqBetter ? 'up' : 'down'}">
          ${liqBetter ? '↑' : '↓'} ${liqBetter ? '+' : '−'}$${fp(liqDelta)} (${dNew !== null ? f(dNew, 1) : '—'}%)
        </span>
      </div>` : ''}
      <div class="pos-stats">
        <div><div class="stat-lbl">СР. ЦЕНА</div><div class="stat-val">$${fp(ap)}</div></div>
        <div><div class="stat-lbl">ОБЪЁМ</div><div class="stat-val">${f(sz, 4)} ${sym}</div></div>
        <div><div class="stat-lbl">PNL</div><div class="stat-val ${pnl >= 0 ? 'up' : 'down'}">${pnl >= 0 ? '+' : ''}${f(pnl, 2)}$</div></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-meta"><span>ДО ЛИКВИДАЦИИ</span><span id="bardist-${p.symbol}">${hasMargin ? f(dNew, 1) : (d !== null ? f(d, 1) : '—')}%</span></div>
        <div class="bar-bg"><div class="bar-fill" id="barfill-${p.symbol}" style="width:${(hasMargin ? dNew : d) !== null ? Math.min((hasMargin ? dNew : d) / 30 * 100, 100) : 0}%"></div></div>
      </div>
      ${(hasMargin ? dangerNew : danger) ? '<div style="margin-top:8px;font-size:10px;font-weight:600;color:var(--down);text-align:center;letter-spacing:.04em">⚠ ЛИКВИДАЦИЯ БЛИЗКО</div>' : ''}
    </div>`;
  });
  area.innerHTML = h + '</div>';

  // Bind margin input
  const mi = document.getElementById('extraMarginInput');
  if (mi) {
    mi.addEventListener('input', (e) => {
      S.extraMargin = parseFloat(e.target.value) || 0;
      renderPositions();
      // Restore focus and cursor position
      const inp = document.getElementById('extraMarginInput');
      if (inp) { inp.focus(); inp.selectionStart = inp.selectionEnd = inp.value.length; }
    });
  }
}

function clearExtraMargin() {
  S.extraMargin = 0;
  renderPositions();
}

// ── Simulator ──────────────────────────────────────────────────────────────────
function renderSimulator() {
  const area = document.getElementById('scrollArea');
  const syms = ['BTCUSDT','ETHUSDT','SOLUSDT','BNBUSDT','XRPUSDT','DOGEUSDT','AVAXUSDT','LINKUSDT','DOTUSDT','ADAUSDT'];
  const wb = S.walletBalance;
  let entriesHtml = '';
  S.simEntries.forEach((e, i) => {
    entriesHtml += `<div class="entry-row">
      <div class="field">${i === 0 ? '<label>ЦЕНА $</label>' : ''}<div class="fw"><input class="sim-input" type="number" inputmode="decimal" data-id="${e.id}" data-field="price" placeholder="95000" value="${e.price}"/></div></div>
      <div class="field">${i === 0 ? '<label>ОБЪЁМ</label>' : ''}<div class="fw"><input class="sim-input" type="number" inputmode="decimal" data-id="${e.id}" data-field="qty" placeholder="0.1" value="${e.qty}"/></div></div>
      <div class="field">${i === 0 ? '<label>ПЛЕЧО</label>' : ''}<div class="fw"><input class="sim-input" type="number" inputmode="decimal" data-id="${e.id}" data-field="leverage" placeholder="10" value="${e.leverage}"/><span class="fsfx">x</span></div></div>
      <button class="btn-rm" onclick="rmSim(${e.id})" style="${S.simEntries.length < 2 ? 'opacity:0;pointer-events:none' : ''}">×</button>
    </div>`;
  });

  const curPrice = S.prices[S.simSymbol]?.price;

  area.innerHTML = `<div class="sec fi">
    ${!wb ? `<div class="card" style="margin-bottom:10px"><div class="field"><label>БАЛАНС КОШЕЛЬКА</label><div class="fw"><input id="manualWallet" type="number" inputmode="decimal" placeholder="1000" style="padding-right:0"/><span class="fsfx">USDT</span></div></div></div>`
    : `<div class="wallet-row" style="margin-bottom:10px"><span class="wl">БАЛАНС</span><span class="wv">$${f(wb, 0)}</span></div>`}
    <div class="card">
      <div style="margin-bottom:12px">
        <div class="lbl" style="margin-bottom:6px">ТОКЕН</div>
        <select id="simSymSel">${syms.map(s => `<option value="${s}" ${s === S.simSymbol ? 'selected' : ''}>${s.replace('USDT', '')}/USDT</option>`).join('')}</select>
        ${curPrice ? `<div style="font-size:12px;font-weight:500;color:var(--dim2);margin-top:6px;text-align:right">Текущая цена: <span id="simCurPrice" style="color:var(--fg)">$${fp(curPrice)}</span></div>` : ''}
      </div>
      <div class="dir-toggle">
        <button class="dir-btn ${S.simDir === 'SHORT' ? 'on' : ''}" onclick="setDir('SHORT')">SHORT</button>
        <button class="dir-btn ${S.simDir === 'LONG' ? 'on' : ''}" onclick="setDir('LONG')">LONG</button>
      </div>
      <div class="lbl">ВХОДЫ</div>
      <div id="simEntriesWrap">${entriesHtml}</div>
      <div style="text-align:right"><button class="btn-add" onclick="addSim()">+ Усреднить</button></div>
    </div>
    <div class="card" id="simResult" style="margin-top:8px"></div>
  </div>`;

  wsSubscribe([S.simSymbol, ...S.positions.map(p => p.symbol)]);

  document.getElementById('simSymSel').onchange = e => { S.simSymbol = e.target.value; renderSimulator(); };
  const mw = document.getElementById('manualWallet');
  if (mw) mw.oninput = e => { S.walletBalance = parseFloat(e.target.value) || 0; updateSimResult(); };
  document.getElementById('simEntriesWrap').addEventListener('input', e => {
    const el = e.target;
    if (!el.classList.contains('sim-input')) return;
    const id = parseInt(el.dataset.id), field = el.dataset.field;
    S.simEntries = S.simEntries.map(en => en.id === id ? {...en, [field]: el.value} : en);
    updateSimResult();
  });
  updateSimResult();
}

function updateSimResult() {
  const box = document.getElementById('simResult');
  if (!box) return;
  const wb = S.walletBalance;
  const allFilled = S.simEntries.every(e => parseFloat(e.price) > 0 && parseFloat(e.qty) > 0);
  const liqNew = allFilled && wb > 0 ? liqSim(wb) : null;
  const match = S.positions.find(p => p.symbol === S.simSymbol && ((p.side === 'Sell' && S.simDir === 'SHORT') || (p.side === 'Buy' && S.simDir === 'LONG')));
  const liqCur = match && wb > 0 ? liqFromPos(match, wb) : null;
  const delta = liqNew && liqCur ? (S.simDir === 'SHORT' ? liqNew - liqCur : liqCur - liqNew) : null;
  const curPrice = S.prices[S.simSymbol]?.price;

  const scp = document.getElementById('simCurPrice');
  if (scp && curPrice) scp.textContent = '$' + fp(curPrice);

  box.innerHTML = `
    <div class="lbl" style="margin-bottom:6px">РЕЗУЛЬТАТ</div>
    <div class="result-row"><span class="rl">Ликвидация после входа</span><span class="rv rv-big">${liqNew ? '$' + fp(liqNew) : '—'}</span></div>
    ${liqCur ? `<div class="result-row"><span class="rl">Текущая (${S.simSymbol.replace('USDT','')})</span><span class="rv">$${fp(liqCur)}</span></div>` : ''}
    ${delta !== null ? `<div class="delta-row"><span style="font-size:11px;font-weight:500;color:var(--dim2)">Изменение</span><span style="font-size:14px;font-weight:600;color:${delta > 0 ? 'var(--up)' : 'var(--down)'}">${delta > 0 ? '↑ +' : '↓ −'}$${fp(Math.abs(delta))} ${delta > 0 ? 'дальше' : 'ближе'}</span></div>` : ''}
    ${!allFilled ? '<div style="font-size:11px;color:var(--dim2);padding:4px 0">Заполни все поля</div>' : ''}
    ${!wb ? '<div style="font-size:11px;color:var(--dim2);padding:4px 0">Укажи баланс кошелька</div>' : ''}
  `;
}

function setDir(d) { S.simDir = d; renderSimulator(); }
function addSim() {
  S.simEntries.push({id: Date.now(), price: '', qty: '', leverage: S.simEntries[0]?.leverage || '10'});
  const wrap = document.getElementById('simEntriesWrap');
  if (!wrap) { renderSimulator(); return; }
  const e = S.simEntries[S.simEntries.length - 1];
  const div = document.createElement('div');
  div.className = 'entry-row';
  div.innerHTML = `
    <div class="field"><div class="fw"><input class="sim-input" type="number" inputmode="decimal" data-id="${e.id}" data-field="price" placeholder="95000" value=""/></div></div>
    <div class="field"><div class="fw"><input class="sim-input" type="number" inputmode="decimal" data-id="${e.id}" data-field="qty" placeholder="0.1" value=""/></div></div>
    <div class="field"><div class="fw"><input class="sim-input" type="number" inputmode="decimal" data-id="${e.id}" data-field="leverage" placeholder="10" value="${e.leverage}"/><span class="fsfx">x</span></div></div>
    <button class="btn-rm" onclick="rmSim(${e.id})">×</button>`;
  wrap.appendChild(div);
}
function rmSim(id) {
  if (S.simEntries.length < 2) return;
  S.simEntries = S.simEntries.filter(e => e.id !== id);
  renderSimulator();
}

// ── Settings ───────────────────────────────────────────────────────────────────
function renderSettings() {
  document.getElementById('scrollArea').innerHTML = `<div class="setup fi">
    <div class="card">
      <div class="field" style="margin-bottom:16px"><label>API KEY</label><div class="fw"><input type="text" id="ki" placeholder="xxxxxxxxxxxxxxx" value="${S.apiKey}" autocomplete="off" autocorrect="off" spellcheck="false" style="padding-right:0;font-size:13px"/></div></div>
      <div class="field"><label>API SECRET</label><div class="fw"><input type="password" id="si" placeholder="••••••••••••••" value="${S.apiSecret}" autocomplete="off" style="padding-right:0;font-size:13px"/></div></div>
    </div>
    <button class="btn-p" onclick="saveKeys()">Сохранить</button>
    ${S.apiKey ? `<button class="btn-s" onclick="clearKeys()">Удалить ключи</button>` : ''}
  </div>`;
}

function saveKeys() {
  const k = document.getElementById('ki')?.value.trim(), s = document.getElementById('si')?.value.trim();
  if (!k || !s) { toast('Заполни оба поля'); return; }
  S.apiKey = k; S.apiSecret = s;
  localStorage.setItem('bk', k); localStorage.setItem('bs', s);
  toast('✓ Сохранено');
  setTimeout(() => { showPage('positions'); refreshPositions(); }, 400);
}
function clearKeys() {
  S.apiKey = ''; S.apiSecret = ''; S.positions = []; S.walletBalance = 0;
  localStorage.removeItem('bk'); localStorage.removeItem('bs');
  renderSettings(); toast('Ключи удалены');
}

function toast(msg) {
  const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Init ───────────────────────────────────────────────────────────────────────
wsConnect();
showPage('positions');
if (S.apiKey && S.apiSecret) refreshPositions();
</script>
</body>
</html>
