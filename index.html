<!DOCTYPE html>
<html lang="ru" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="LIQ"/>
<meta name="theme-color" content="#ffffff"/>
<title>LIQ CALC</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
[data-theme="light"]{
  --bg:#f0f0f0;--bg2:#fff;--fg:#000;
  --b1:#d5d5d5;--b2:#c5c5c5;--b3:#aaa;
  --dim:#111;--dim2:#666;
  --card:#fff;--nav:#fff;
  --input-border:#ccc;--input-border-focus:#000;
  --bar-bg:#e8e8e8;--bar-fill:#000;
  --btn-p-bg:#000;--btn-p-fg:#fff;
  --btn-s-border:#ccc;--btn-s-fg:#666;
  --toast-bg:#000;--toast-fg:#fff;
  --up:#16a34a;--down:#dc2626;--warn:#d97706;
}
[data-theme="dark"]{
  --bg:#000;--bg2:#111;--fg:#fff;
  --b1:#222;--b2:#333;--b3:#444;
  --dim:#fff;--dim2:#888;
  --card:#111;--nav:#000;
  --input-border:#333;--input-border-focus:#fff;
  --bar-bg:#222;--bar-fill:#fff;
  --btn-p-bg:#fff;--btn-p-fg:#000;
  --btn-s-border:#333;--btn-s-fg:#666;
  --toast-bg:#fff;--toast-fg:#000;
  --up:#4ade80;--down:#f87171;--warn:#fbbf24;
}
:root{--font:-apple-system,'SF Pro Text','SF Pro Display',system-ui,sans-serif;--r:10px}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--font);-webkit-font-smoothing:antialiased;overscroll-behavior:none;font-size:14px;transition:background .2s,color .2s}
body{display:flex;flex-direction:column;min-height:100dvh}
::-webkit-scrollbar{width:0}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input[type=number]{-moz-appearance:textfield}
.safe-top{height:env(safe-area-inset-top);background:var(--bg2);flex-shrink:0;transition:background .2s}
.app{flex:1;display:flex;flex-direction:column;max-width:480px;margin:0 auto;width:100%;overflow:hidden;min-height:0}
.scroll-area{flex:1;overflow-y:auto;padding-bottom:calc(env(safe-area-inset-bottom) + 90px)}
.header{padding:16px 16px 14px;border-bottom:1px solid var(--b1);display:flex;align-items:center;justify-content:space-between;background:var(--bg2);flex-shrink:0;transition:background .2s,border-color .2s}
.h-title{font-size:13px;font-weight:600;letter-spacing:.04em;color:var(--fg)}
.h-right{display:flex;gap:8px;align-items:center}
.ws-dot{width:7px;height:7px;border-radius:50%;background:#ccc;transition:background .3s;flex-shrink:0}
.ws-dot.connected{background:var(--up)}.ws-dot.error{background:var(--down)}
.btn-icon{background:none;border:1px solid var(--b2);color:var(--dim2);border-radius:8px;padding:8px 12px;font-family:var(--font);font-size:14px;cursor:pointer;transition:all .15s;line-height:1}
.btn-icon:active{background:var(--b1);color:var(--fg)}
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;display:flex;background:var(--nav);border-top:1px solid var(--b1);padding-bottom:env(safe-area-inset-bottom);transition:background .2s,border-color .2s}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:16px 0;background:none;border:none;cursor:pointer}
.nav-btn span{font-size:10px;letter-spacing:.06em;text-transform:uppercase;transition:color .15s;font-weight:600}
.nav-icon{font-size:22px;line-height:1;transition:color .15s}
.nav-btn.active span,.nav-btn.active .nav-icon{color:var(--fg)}
.nav-btn:not(.active) span,.nav-btn:not(.active) .nav-icon{color:var(--b3)}
.sec{padding:14px 16px}.lbl{font-size:10px;font-weight:600;color:var(--dim2);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px}
.card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:14px;margin-bottom:8px;transition:background .2s,border-color .2s}
.pos-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.pos-sym{font-size:17px;font-weight:600;letter-spacing:.01em}
.pos-badge{display:inline-block;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px;background:var(--b1);color:var(--dim2);margin-top:4px;letter-spacing:.04em}
.pos-right{text-align:right}
.pos-price-lbl{font-size:10px;color:var(--dim2);font-weight:500;letter-spacing:.04em}
.pos-price-val{font-size:22px;font-weight:300;letter-spacing:-.01em;line-height:1.1;margin-top:1px}
.pos-price-change{font-size:11px;font-weight:500;margin-top:1px}
.up{color:var(--up)}.down{color:var(--down)}
.liq-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-top:1px solid var(--b1)}
.liq-lbl{font-size:10px;color:var(--dim2);font-weight:500}
.liq-val{font-size:16px;font-weight:500;letter-spacing:-.01em}
.liq-danger{text-decoration:underline;text-decoration-style:wavy;text-underline-offset:3px}
.pos-stats{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;padding-top:10px;border-top:1px solid var(--b1)}
.stat-lbl{font-size:10px;color:var(--dim2);font-weight:500;margin-bottom:2px}
.stat-val{font-size:12px;font-weight:500}
.bar-wrap{margin-top:10px;padding-top:10px;border-top:1px solid var(--b1)}
.bar-meta{display:flex;justify-content:space-between;font-size:10px;font-weight:500;color:var(--dim2);margin-bottom:5px}
.bar-bg{height:2px;background:var(--bar-bg);border-radius:1px;overflow:hidden}
.bar-fill{height:100%;background:var(--bar-fill);border-radius:1px;transition:width .5s ease}
.wallet-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;transition:all .2s}
.wl{font-size:10px;font-weight:600;color:var(--dim2);letter-spacing:.06em}
.wv{font-size:20px;font-weight:300;letter-spacing:-.01em}
.margin-card{background:var(--card);border:1px solid var(--b1);border-radius:var(--r);padding:12px 14px;margin-bottom:8px;transition:all .2s}
.margin-card.active{border-color:var(--up)}
.margin-inner{display:flex;align-items:center;gap:10px}
.margin-icon{font-size:14px;color:var(--dim2);flex-shrink:0;transition:color .2s}
.margin-card.active .margin-icon{color:var(--up)}
.margin-field{flex:1;position:relative}
.margin-field input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--input-border);color:var(--fg);font-family:var(--font);font-size:16px;font-weight:400;padding:8px 50px 8px 0;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.margin-field input:focus{border-color:var(--input-border-focus)}
.margin-field input::placeholder{color:var(--b3)}
.margin-sfx{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:11px;color:var(--dim2);pointer-events:none;font-weight:500}
.margin-new-bal{font-size:11px;color:var(--dim2);font-weight:500;margin-top:6px;text-align:right;transition:color .2s}
.margin-card.active .margin-new-bal{color:var(--up)}
.margin-reset{background:none;border:1px solid var(--b2);border-radius:6px;color:var(--dim2);font-family:var(--font);font-size:11px;font-weight:500;padding:6px 12px;cursor:pointer;flex-shrink:0;transition:all .15s}
.margin-reset:active{border-color:var(--fg);color:var(--fg)}
.liq-sim-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid var(--b1)}
.liq-sim-lbl{font-size:10px;color:var(--dim2);font-weight:500}
.liq-sim-val{font-size:14px;font-weight:600;letter-spacing:-.01em}
.field{display:flex;flex-direction:column;gap:3px}
.field label{font-size:10px;font-weight:600;color:var(--dim2);letter-spacing:.06em;text-transform:uppercase}
.fw{position:relative}
.fw input{width:100%;background:transparent;border:none;border-bottom:1px solid var(--input-border);color:var(--fg);font-family:var(--font);font-size:16px;font-weight:400;padding:10px 26px 10px 0;outline:none;transition:border-color .15s;-webkit-appearance:none;appearance:none}
.fw input:focus{border-color:var(--input-border-focus)}
.fw input::placeholder{color:var(--b3)}
.fsfx{position:absolute;right:0;top:50%;transform:translateY(-50%);font-size:11px;color:var(--dim2);pointer-events:none;font-weight:500}
.dir-toggle{display:flex;border:1px solid var(--b2);border-radius:10px;overflow:hidden;margin-bottom:14px}
.dir-btn{flex:1;padding:13px;font-family:var(--font);font-size:13px;font-weight:500;letter-spacing:.04em;cursor:pointer;border:none;background:transparent;color:var(--dim2);transition:all .15s}
.dir-btn.on{background:var(--fg);color:var(--bg)}
.btn-p{width:100%;padding:16px;border:none;border-radius:var(--r);background:var(--btn-p-bg);color:var(--btn-p-fg);font-family:var(--font);font-size:14px;font-weight:600;letter-spacing:.04em;cursor:pointer;transition:all .15s}
.btn-p:active{opacity:.75}
.btn-s{width:100%;padding:14px;border:1px solid var(--btn-s-border);border-radius:var(--r);background:transparent;color:var(--btn-s-fg);font-family:var(--font);font-size:13px;font-weight:500;letter-spacing:.04em;cursor:pointer;margin-top:8px;transition:all .15s}
.btn-s:active{background:var(--b1)}
.btn-add{padding:9px 14px;border:1px solid var(--b2);border-radius:8px;background:transparent;color:var(--dim2);font-family:var(--font);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-add:active{border-color:var(--fg);color:var(--fg)}
.btn-rm{background:none;border:none;color:var(--b3);font-size:22px;cursor:pointer;padding:4px 6px;line-height:1;align-self:flex-end;padding-bottom:5px}
.btn-rm:active{color:var(--fg)}
.entry-row{display:grid;grid-template-columns:1fr 1fr 1fr 22px;gap:10px;align-items:end;margin-bottom:12px}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0}
.result-row+.result-row{border-top:1px solid var(--b1)}
.rl{font-size:11px;color:var(--dim2);font-weight:500}
.rv{font-size:15px;font-weight:500}
.rv-big{font-size:24px;font-weight:300;letter-spacing:-.01em}
.delta-row{margin-top:8px;padding:9px 12px;border:1px solid var(--b1);border-radius:8px;display:flex;justify-content:space-between;align-items:center;background:var(--bg)}
.toast{position:fixed;top:calc(env(safe-area-inset-top) + 52px);left:50%;transform:translateX(-50%) translateY(-4px);background:var(--toast-bg);color:var(--toast-fg);border-radius:6px;padding:9px 16px;font-size:12px;font-weight:500;opacity:0;transition:all .2s;pointer-events:none;white-space:nowrap;z-index:100}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.empty{text-align:center;padding:52px 20px;color:var(--dim2)}
.empty-t{font-size:13px;line-height:1.7;font-weight:400}
.fi{animation:fi .2s ease forwards}
@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.spin{animation:sp .7s linear infinite;display:inline-block}
@keyframes sp{to{transform:rotate(360deg)}}
.blink{animation:bl 1.4s ease-in-out infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:.3}}
.flash{animation:flash .4s ease}
@keyframes flash{0%,100%{opacity:1}50%{opacity:.3}}
.setup{padding:20px 16px;display:flex;flex-direction:column;gap:12px}
select{background:var(--card);border:1px solid var(--b2);color:var(--fg);font-family:var(--font);font-size:15px;font-weight:400;padding:12px 12px;border-radius:10px;width:100%;outline:none;-webkit-appearance:none;transition:all .2s}
select:focus{border-color:var(--input-border-focus)}
.sub-tabs{display:flex;gap:0;margin-bottom:12px;border:1px solid var(--b2);border-radius:10px;overflow:hidden}
.sub-tab{flex:1;padding:12px;font-family:var(--font);font-size:12px;font-weight:500;letter-spacing:.04em;cursor:pointer;border:none;background:transparent;color:var(--dim2);transition:all .15s;text-align:center}
.sub-tab.on{background:var(--fg);color:var(--bg)}
.stress-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stress-cell{padding:12px 10px;border:1px solid var(--b1);border-radius:8px;text-align:center;transition:all .2s}
.stress-pct{font-size:10px;font-weight:600;color:var(--dim2);letter-spacing:.04em;margin-bottom:3px}
.stress-val{font-size:14px;font-weight:500}
.stress-liq{font-size:10px;font-weight:600;margin-top:2px}
.fund-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.fund-row+.fund-row{border-top:1px solid var(--b1)}
.fund-sym{font-size:13px;font-weight:600}
.fund-right{text-align:right}
.fund-rate{font-size:14px;font-weight:500}
.fund-cost{font-size:11px;color:var(--dim2);font-weight:500;margin-top:1px}
.fund-timer{font-size:10px;color:var(--dim2);font-weight:500;margin-top:2px}
.risk-meter{height:4px;background:var(--bar-bg);border-radius:2px;overflow:hidden;margin:6px 0}
.risk-fill{height:100%;border-radius:2px;transition:width .5s ease,background .3s}
.risk-row{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.risk-row+.risk-row{border-top:1px solid var(--b1)}
.risk-lbl{font-size:11px;color:var(--dim2);font-weight:500}
.risk-val{font-size:14px;font-weight:600}
.sum-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.sum-item{padding:14px;border:1px solid var(--b1);border-radius:8px;text-align:center}
.sum-val{font-size:18px;font-weight:500;margin-bottom:2px}
.sum-lbl{font-size:10px;color:var(--dim2);font-weight:500;letter-spacing:.04em}
.hist-row{padding:12px 0;border-bottom:1px solid var(--b1)}
.hist-row:last-child{border:none}
.hist-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hist-sym{font-size:14px;font-weight:600}
.hist-pnl{font-size:15px;font-weight:600}
.hist-meta{display:flex;gap:12px;font-size:11px;color:var(--dim2);font-weight:500}
.hist-date{font-size:10px;color:var(--dim2);margin-top:3px}
</style>
</head>
<body>
<div class="safe-top"></div>
<div class="app">
  <div class="header">
    <div style="display:flex;align-items:center;gap:8px">
      <div class="ws-dot" id="wsDot"></div>
      <span class="h-title">LIQ CALC</span>
    </div>
    <div class="h-right">
      <button class="btn-icon" id="themeBtn" onclick="toggleTheme()">‚òΩ</button>
      <button class="btn-icon" id="refreshBtn" onclick="refreshAll()" style="display:none"><span id="ri">‚ü≥</span></button>
    </div>
  </div>
  <div class="scroll-area" id="scrollArea"></div>
  <nav class="bottom-nav">
    <button class="nav-btn active" id="nav-positions" onclick="showPage('positions')"><span class="nav-icon">‚ñ¶</span><span>–ü–æ–∑–∏—Ü–∏–∏</span></button>
    <button class="nav-btn" id="nav-simulator" onclick="showPage('simulator')"><span class="nav-icon">‚óé</span><span>–°–∏–º—É–ª—è—Ç–æ—Ä</span></button>
    <button class="nav-btn" id="nav-analytics" onclick="showPage('analytics')"><span class="nav-icon">‚óà</span><span>–ê–Ω–∞–ª–∏—Ç–∏–∫–∞</span></button>
    <button class="nav-btn" id="nav-settings" onclick="showPage('settings')"><span class="nav-icon">‚öô</span><span>API</span></button>
  </nav>
</div>
<div class="toast" id="toast"></div>

<script>
let theme=localStorage.getItem('theme')||'light';applyTheme(theme);
function applyTheme(t){theme=t;document.documentElement.setAttribute('data-theme',t);document.getElementById('themeBtn').textContent=t==='light'?'‚òΩ':'‚òÄÔ∏é';document.querySelector('meta[name="theme-color"]').content=t==='light'?'#ffffff':'#000000';localStorage.setItem('theme',t)}
function toggleTheme(){applyTheme(theme==='light'?'dark':'light')}

const S={apiKey:localStorage.getItem('bk')||'',apiSecret:localStorage.getItem('bs')||'',positions:[],walletBalance:0,loading:false,page:'positions',prices:{},simDir:'SHORT',simSymbol:'BTCUSDT',simEntries:[{id:1,price:'',qty:'',leverage:'10'}],extraMargin:0,analyticsTab:'risk',closedPnl:[],closedLoading:false};
const MM=0.005;

// WS
let ws=null,wsTimer=null,wsSubs=[];
function wsConnect(){if(ws&&ws.readyState<=1)return;ws=new WebSocket('wss://stream.bybit.com/v5/public/linear');ws.onopen=()=>{setWsDot('connected');if(wsSubs.length)wsSub(wsSubs)};ws.onmessage=e=>{const d=JSON.parse(e.data);if(d.topic&&d.topic.startsWith('tickers.')){const sym=d.topic.split('.')[1],tick=d.data,price=parseFloat(tick?.lastPrice);if(price){const prev=S.prices[sym]?.price||price,fr=tick?.fundingRate!=null?parseFloat(tick.fundingRate):S.prices[sym]?.fundingRate,nft=tick?.nextFundingTime?parseInt(tick.nextFundingTime):S.prices[sym]?.nextFundingTime;S.prices[sym]={price,prevPrice:prev,fundingRate:fr,nextFundingTime:nft};updatePriceDom(sym,price,prev)}}};ws.onclose=()=>{setWsDot('');wsTimer=setTimeout(wsConnect,3000)};ws.onerror=()=>{setWsDot('error');ws.close()}}
function wsSub(symbols){wsSubs=[...new Set(symbols)];if(!ws||ws.readyState!==1){wsConnect();return}ws.send(JSON.stringify({op:'subscribe',args:symbols.map(s=>'tickers.'+s)}))}
function setWsDot(s){const d=document.getElementById('wsDot');if(d)d.className='ws-dot'+(s?' '+s:'')}

function updatePriceDom(sym,price){
  const el=document.getElementById('price-'+sym);if(el){el.textContent='$'+fp(price);el.classList.remove('flash');void el.offsetWidth;el.classList.add('flash')}
  const chEl=document.getElementById('pchange-'+sym);
  if(chEl){const pos=S.positions.find(p=>p.symbol===sym);if(pos){const entry=parseFloat(pos.avgPrice),pct=pos.side==='Sell'?(entry-price)/entry*100:(price-entry)/entry*100;chEl.textContent=(pct>=0?'+':'')+f(pct,2)+'%';chEl.className='pos-price-change '+(pct>=0?'up':'down')}}
  if(S.page==='simulator')updateSimResult()
}

// Auth
async function bybitSign(params){const ts=Date.now().toString(),rw='5000',qs=Object.keys(params).sort().map(k=>k+'='+params[k]).join('&'),pl=ts+S.apiKey+rw+qs,k=await crypto.subtle.importKey('raw',new TextEncoder().encode(S.apiSecret),{name:'HMAC',hash:'SHA-256'},false,['sign']),sig=await crypto.subtle.sign('HMAC',k,new TextEncoder().encode(pl));return{ts,rw,hex:Array.from(new Uint8Array(sig)).map(b=>b.toString(16).padStart(2,'0')).join('')}}
async function bybit(ep,params={}){const{ts,rw,hex}=await bybitSign(params);const qs=Object.keys(params).sort().map(k=>k+'='+encodeURIComponent(params[k])).join('&');const r=await fetch('https://api.bybit.com'+ep+(qs?'?'+qs:''),{headers:{'X-BAPI-API-KEY':S.apiKey,'X-BAPI-TIMESTAMP':ts,'X-BAPI-RECV-WINDOW':rw,'X-BAPI-SIGN':hex}});return r.json()}

async function refreshAll(){
  if(!S.apiKey||!S.apiSecret){toast('‚öÝ –ù–µ—Ç API –∫–ª—é—á–µ–π');showPage('settings');return}
  if(S.loading)return;S.loading=true;const ri=document.getElementById('ri');if(ri)ri.className='spin';
  try{
    const[pd,wd]=await Promise.all([bybit('/v5/position/list',{category:'linear',settleCoin:'USDT'}),bybit('/v5/account/wallet-balance',{accountType:'UNIFIED'})]);
    if(pd.retCode!==0)throw new Error(pd.retMsg);
    S.positions=(pd.result.list||[]).filter(p=>parseFloat(p.size)>0);
    const coin=wd.result.list?.[0]?.coin?.find(c=>c.coin==='USDT');S.walletBalance=parseFloat(coin?.walletBalance||0);
    const syms=[...new Set(S.positions.map(p=>p.symbol))];if(syms.length)wsSub(syms);
    if(S.page==='positions')renderPositions();if(S.page==='analytics')renderAnalytics();toast('‚úì –û–±–Ω–æ–≤–ª–µ–Ω–æ');
  }catch(e){toast('‚úó '+e.message)}
  finally{S.loading=false;if(ri){ri.className='';ri.textContent='‚ü≥'}}
}
async function fetchClosedPnl(){
  if(S.closedLoading)return;S.closedLoading=true;
  try{const r=await bybit('/v5/position/closed-pnl',{category:'linear',limit:'50'});if(r.retCode===0)S.closedPnl=r.result.list||[]}
  catch(e){toast('‚úó '+e.message)}finally{S.closedLoading=false}
}

// Calc
function totalIM(){return S.positions.reduce((s,p)=>{const pv=parseFloat(p.avgPrice)*parseFloat(p.size);return s+pv/parseFloat(p.leverage)},0)}
function liqFromPos(p,wb){const ap=parseFloat(p.avgPrice),sz=parseFloat(p.size),pv=ap*sz,mm=pv*MM,im=totalIM();const liq=p.side==='Sell'?ap+(wb-im+mm)/sz:ap-(wb-im+mm)/sz;return Math.max(0.0001,liq)}
function liqSim(wb){const es=S.simEntries.filter(e=>parseFloat(e.price)>0&&parseFloat(e.qty)>0);if(!es.length||!wb)return null;const allIM=[...S.positions.map(p=>({p:parseFloat(p.avgPrice),q:parseFloat(p.size),l:parseFloat(p.leverage)})),...es.map(e=>({p:parseFloat(e.price),q:parseFloat(e.qty),l:parseFloat(e.leverage)||1}))].reduce((s,e)=>s+(e.p*e.q)/e.l,0);const simQ=es.reduce((s,e)=>s+parseFloat(e.qty),0),simAvg=es.reduce((s,e)=>s+parseFloat(e.price)*parseFloat(e.qty),0)/simQ;const match=S.positions.find(p=>p.symbol===S.simSymbol&&((p.side==='Sell'&&S.simDir==='SHORT')||(p.side==='Buy'&&S.simDir==='LONG')));let tq=simQ,tav=simAvg*simQ;if(match){tq+=parseFloat(match.size);tav+=parseFloat(match.avgPrice)*parseFloat(match.size)}const avg=tav/tq,pv=avg*tq,mm=pv*MM;return S.simDir==='SHORT'?avg+(wb-allIM+mm)/tq:avg-(wb-allIM+mm)/tq}

  });

  box.innerHTML='<div class="card"><div class="lbl">–ü–û–Ý–¢–§–ï–õ–¨</div><div class="risk-row"><span class="risk-lbl">–û–±—â–∞—è —ç–∫—Å–ø–æ–∑–∏—Ü–∏—è</span><span class="risk-val">$'+f(totalN,0)+' <span style="font-size:11px;color:var(--dim2)">('+f(expPct,0)+'%)</span></span></div><div class="risk-row"><span class="risk-lbl">–ú–∞—Ä–∂–∞ –∏—Å–ø–æ–ª—å–∑–æ–≤–∞–Ω–∞</span><span class="risk-val">$'+f(totalI,0)+' <span style="font-size:11px;color:var(--dim2)">('+f(mrgPct,1)+'%)</span></span></div><div class="risk-row"><span class="risk-lbl">–ú–∞–∫—Å. —É–±—ã—Ç–æ–∫ (–≤—Å–µ)</span><span class="risk-val down">‚àí$'+f(totalML,0)+' <span style="font-size:11px">('+f(mlPct,1)+'%)</span></span></div><div class="risk-row"><span class="risk-lbl">–û–±—â–∏–π PnL</span><span class="risk-val '+(totalPnl>=0?'up':'down')+'">'+(totalPnl>=0?'+':'')+'$'+f(totalPnl,2)+'</span></div><div style="margin-top:6px"><div style="display:flex;justify-content:space-between;font-size:10px;font-weight:600;color:var(--dim2);margin-bottom:4px"><span>–£–Ý–û–í–ï–ù–¨ –Ý–ò–°–ö–ê</span><span style="color:'+riskClr+'">'+riskLvl+'</span></div><div class="risk-meter"><div class="risk-fill" style="width:'+riskW+'%;background:'+riskClr+'"></div></div></div></div>'+rows

// STRESS
function renderStress(){
  const box=document.getElementById('aC');if(!box)return;
  if(!S.positions.length){box.innerHTML='<div class="empty"><div class="empty-t">–ù–µ—Ç –æ—Ç–∫—Ä—ã—Ç—ã—Ö –ø–æ–∑–∏—Ü–∏–π</div></div>';return}
  const wb=S.walletBalance,sc=[-20,-15,-10,-5,5,10,15,20];let h='';
  S.positions.forEach(p=>{
    const ap=parseFloat(p.avgPrice),sz=parseFloat(p.size),lv=parseFloat(p.leverage),curPrice=S.prices[p.symbol]?.price||ap,sym=p.symbol.replace('USDT',''),liq=liqFromPos(p,wb);
    h+='<div class="card"><div style="margin-bottom:10px"><span style="font-size:15px;font-weight:600">'+sym+'</span> <span class="pos-badge">'+(p.side==='Sell'?'SHORT':'LONG')+' ¬∑ '+lv+'x</span><div style="font-size:11px;color:var(--dim2);margin-top:4px">–¶–µ–Ω–∞: $'+fp(curPrice)+' ¬∑ –õ–∏–∫–≤: $'+fp(liq)+'</div></div><div class="stress-grid">';
    sc.forEach(pct=>{
      const np=curPrice*(1+pct/100),pnl=p.side==='Sell'?(ap-np)*sz:(np-ap)*sz,isLiq=p.side==='Sell'?np>=liq:np<=liq,dtl=distPct(liq,np,p.side);
      h+='<div class="stress-cell" style="'+(isLiq?'border-color:var(--down);background:rgba(220,38,38,.06)':'')+'"><div class="stress-pct">'+(pct>0?'+':'')+pct+'%</div><div class="stress-val '+(pnl>=0?'up':'down')+'">'+(pnl>=0?'+':'')+'$'+f(pnl,0)+'</div>'+(isLiq?'<div class="stress-liq down">–õ–ò–ö–í–ò–î–ê–¶–ò–Ø</div>':'<div class="stress-liq" style="color:var(--dim2)">–î–æ –ª–∏–∫–≤: '+f(dtl,1)+'%</div>')+'</div>'
    });
    h+='</div></div>'
  });
  h+='<div class="card"><div class="lbl">–û–ë–©–ò–ô PNL –ü–û –°–¶–ï–ù–ê–Ý–ò–Ø–ú</div>';
  sc.forEach(pct=>{let tp=0,anyL=false;S.positions.forEach(p=>{const ap=parseFloat(p.avgPrice),sz=parseFloat(p.size),curPrice=S.prices[p.symbol]?.price||ap,np=curPrice*(1+pct/100),liq=liqFromPos(p,wb);if(p.side==='Sell'?np>=liq:np<=liq)anyL=true;tp+=p.side==='Sell'?(ap-np)*sz:(np-ap)*sz});const pb=wb>0?tp/wb*100:0;h+='<div class="risk-row"><span class="risk-lbl">'+(pct>0?'+':'')+pct+'% —Ä—ã–Ω–æ–∫</span><span class="risk-val '+(tp>=0?'up':'down')+'">'+(tp>=0?'+':'')+'$'+f(tp,0)+' <span style="font-size:10px">('+f(pb,1)+'%)</span>'+(anyL?' <span style="color:var(--down);font-size:10px">‚öÝ</span>':'')+'</span></div>'});
  h+='</div>';box.innerHTML=h
}

function renderFunding(){

  if(!S.positions.length){box.innerHTML='<div class="empty"><div class="empty-t">–ù–µ—Ç –æ—Ç–∫—Ä—ã—Ç—ã—Ö –ø–æ–∑–∏—Ü–∏–π</div></div>';return}
  let h='<div class="card"><div class="lbl">–§–ê–ù–î–ò–ù–ì –Ý–ï–ô–¢ (LIVE)</div>',totalFD=0;
  S.positions.forEach(p=>{
    const sym=p.symbol.replace('USDT',''),sz=parseFloat(p.size),curPrice=S.prices[p.symbol]?.price||parseFloat(p.avgPrice),fr=S.prices[p.symbol]?.fundingRate,nft=S.prices[p.symbol]?.nextFundingTime,notional=curPrice*sz;

// HISTORY
function renderHistory(){
  const box=document.getElementById('aC');if(!box)return;
  if(!S.closedPnl.length){box.innerHTML='<div class="card" style="text-align:center;padding:20px"><span class="spin" style="font-size:16px">‚ü≥</span><div style="font-size:11px;color:var(--dim2);margin-top:8px">–ó–∞–≥—Ä—É–∑–∫–∞ –∏—Å—Ç–æ—Ä–∏–∏...</div></div>';fetchClosedPnl().then(()=>renderHistContent());return}
  renderHistContent()
}
function renderHistContent(){
  const box=document.getElementById('aC');if(!box)return;const trades=S.closedPnl;
  if(!trades.length){box.innerHTML='<div class="empty"><div class="empty-t">–ù–µ—Ç –∑–∞–∫—Ä—ã—Ç—ã—Ö —Å–¥–µ–ª–æ–∫</div></div>';return}
  let wins=0,losses=0,totalW=0,totalL=0,totalP=0;
  trades.forEach(t=>{const pnl=parseFloat(t.closedPnl);totalP+=pnl;if(pnl>=0){wins++;totalW+=pnl}else{losses++;totalL+=Math.abs(pnl)}});
  const wr=trades.length>0?wins/trades.length*100:0,aW=wins>0?totalW/wins:0,aL=losses>0?totalL/losses:0,aRR=aL>0?aW/aL:0,pf=totalL>0?totalW/totalL:totalW>0?Infinity:0;
  let h='<div class="sum-grid"><div class="sum-item"><div class="sum-val '+(totalP>=0?'up':'down')+'">'+(totalP>=0?'+':'')+'$'+f(totalP,2)+'</div><div class="sum-lbl">–û–ë–©–ò–ô PNL</div></div><div class="sum-item"><div class="sum-val" style="color:'+(wr>=50?'var(--up)':'var(--down)')+'">'+f(wr,1)+'%</div><div class="sum-lbl">–í–ò–ù–Ý–ï–ô–¢</div></div><div class="sum-item"><div class="sum-val">'+f(aRR,2)+'</div><div class="sum-lbl">–°–Ý. R:R</div></div><div class="sum-item"><div class="sum-val">'+(pf===Infinity?'‚àû':f(pf,2))+'</div><div class="sum-lbl">–ü–Ý–û–§–ò–¢-–§–ê–ö–¢–û–Ý</div></div></div>';
  h+='<div class="card"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><span class="lbl" style="margin:0">–ü–û–ë–ï–î–´</span><span style="font-size:12px;font-weight:600;color:var(--up)">'+wins+'</span></div><div style="display:flex;justify-content:space-between"><span class="lbl" style="margin:0">–ü–û–Ý–ê–ñ–ï–ù–ò–Ø</span><span style="font-size:12px;font-weight:600;color:var(--down)">'+losses+'</span></div></div>';
  // Equity curve
  let eq=0;const pts=[];[...trades].reverse().forEach(t=>{eq+=parseFloat(t.closedPnl);pts.push(eq)});
  if(pts.length>1){const mx=Math.max(...pts),mn=Math.min(...pts),rng=mx-mn||1,w=300,hh=60,step=w/(pts.length-1);let path=pts.map((v,i)=>{const x=i*step,y=hh-((v-mn)/rng*hh);return(i===0?'M':'L')+x+','+y}).join(' ');const last=pts[pts.length-1],lc=last>=0?'var(--up)':'var(--down)';
  h+='<div class="card"><div class="lbl">EQUITY CURVE</div><svg viewBox="0 0 '+w+' '+hh+'" style="width:100%;height:60px" preserveAspectRatio="none"><path d="'+path+'" fill="none" stroke="'+lc+'" stroke-width="1.5" vector-effect="non-scaling-stroke"/></svg><div style="display:flex;justify-content:space-between;font-size:10px;color:var(--dim2);margin-top:4px"><span>–ù–∞—á–∞–ª–æ</span><span>–°–µ–π—á–∞—Å: <span style="color:'+lc+'">'+(last>=0?'+':'')+'$'+f(last,2)+'</span></span></div></div>'}
  // Trades list
  h+='<div class="card"><div class="lbl">–ü–û–°–õ–ï–î–ù–ò–ï –°–î–ï–õ–ö–ò</div>';
  trades.forEach(t=>{const pnl=parseFloat(t.closedPnl),sym=t.symbol.replace('USDT',''),side=t.side==='Sell'?'SHORT':'LONG',qty=parseFloat(t.qty),entry=parseFloat(t.avgEntryPrice),exit=parseFloat(t.avgExitPrice),dt=new Date(parseInt(t.updatedTime)),ds=dt.toLocaleDateString('ru-RU',{day:'2-digit',month:'short'})+' '+dt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'}),lev=parseFloat(t.leverage||0);
  h+='<div class="hist-row"><div class="hist-top"><span class="hist-sym">'+sym+' <span class="pos-badge">'+side+(lev?' ¬∑ '+lev+'x':'')+'</span></span><span class="hist-pnl '+(pnl>=0?'up':'down')+'">'+(pnl>=0?'+':'')+'$'+f(pnl,2)+'</span></div><div class="hist-meta"><span>–í—Ö–æ–¥: $'+fp(entry)+'</span><span>–í—ã—Ö–æ–¥: $'+fp(exit)+'</span><span>'+f(qty,4)+'</span></div><div class="hist-date">'+ds+'</div></div>'});
  h+='</div>';box.innerHTML=h
}
